<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC 5M Live</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #050507;
  --card: #0c0c10;
  --card2: #111116;
  --border: #18181f;
  --border2: #222230;
  --text: #f0f0f8;
  --sub: #9090a8;
  --muted: #44445a;
  --green: #00e676;
  --green-dim: rgba(0,230,118,0.07);
  --green-border: rgba(0,230,118,0.18);
  --red: #ff1744;
  --red-dim: rgba(255,23,68,0.07);
  --red-border: rgba(255,23,68,0.18);
  --amber: #ff9800;
  --blue: #2979ff;
}
body { background: var(--bg); color: var(--text); font-family: 'Geist', 'Inter', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* HEADER */
header {
  height: 50px; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; letter-spacing: -0.3px; }
.btc-icon { width: 24px; height: 24px; background: #f7931a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: white; }
.header-right { display: flex; align-items: center; gap: 14px; }
.ws-pill {
  display: flex; align-items: center; gap: 5px;
  font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
  padding: 3px 9px; border-radius: 100px; border: 1px solid; transition: all 0.4s;
}
.ws-pill.connected { color: var(--green); border-color: var(--green-border); background: var(--green-dim); }
.ws-pill.connecting { color: var(--amber); border-color: rgba(255,152,0,0.3); background: rgba(255,152,0,0.06); }
.ws-pill.disconnected { color: var(--muted); border-color: var(--border2); background: transparent; }
.ws-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.ws-pill.connected .ws-dot { animation: blink 1.6s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.clock { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }

/* BTC STRIP */
.btc-strip {
  padding: 18px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.btc-strip-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
.btc-big { font-family: 'Space Mono', monospace; font-size: 30px; font-weight: 700; letter-spacing: -1.5px; transition: color 0.25s; }
.btc-big.up { color: var(--green); }
.btc-big.down { color: var(--red); }
.source-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--sub); margin-top: 5px;
}
.cl-badge {
  font-family: 'Space Mono', monospace; font-size: 8px; font-weight: 700;
  background: rgba(41,121,255,0.12); border: 1px solid rgba(41,121,255,0.25); color: #5b9bff;
  padding: 2px 6px; border-radius: 3px;
}

/* MAIN */
.main { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }

/* CARD */
.mcard {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; overflow: hidden; transition: border-color 0.4s;
}
.mcard.live { border-color: var(--green-border); }

.mcard-top {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.mcard-title { font-size: 15px; font-weight: 700; letter-spacing: -0.4px; }
.mcard-sub { font-size: 11px; color: var(--sub); margin-top: 3px; font-family: 'Space Mono', monospace; }

.spill {
  display: flex; align-items: center; gap: 5px;
  font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
  padding: 4px 10px; border-radius: 100px; border: 1px solid; flex-shrink: 0;
}
.spill.live { background: var(--green-dim); border-color: var(--green-border); color: var(--green); }
.spill.settled { background: rgba(68,68,90,0.12); border-color: var(--border2); color: var(--muted); }
.spill-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }
.spill.live .spill-dot { animation: blink 1.2s ease-in-out infinite; }

/* PTB ROW */
.ptb-row {
  display: grid; grid-template-columns: 1fr 1px 1fr;
  border-bottom: 1px solid var(--border);
}
.ptb-col { padding: 14px 22px; }
.ptb-sep { background: var(--border); margin: 10px 0; }
.ptb-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.ptb-val { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; letter-spacing: -0.8px; }
.ptb-hint { font-size: 11px; color: var(--sub); margin-top: 3px; }

.dtag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 700; font-family: 'Space Mono', monospace;
  padding: 3px 8px; border-radius: 5px; margin-top: 6px;
}
.dtag.up   { background: var(--green-dim); color: var(--green); }
.dtag.down { background: var(--red-dim);   color: var(--red); }
.dtag.flat { background: rgba(68,68,90,0.1); color: var(--muted); }

/* TIMER */
.timer-row {
  padding: 11px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.timer-lbl { font-size: 11px; color: var(--sub); flex-shrink: 0; }
.timer-val { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; flex-shrink: 0; min-width: 46px; }
.timer-track { flex: 1; height: 2px; background: var(--border2); border-radius: 1px; overflow: hidden; }
.timer-fill  { height: 100%; border-radius: 1px; transition: width 1s linear; }

/* ODDS */
.odds-row {
  padding: 16px 22px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.otile {
  border-radius: 14px; padding: 18px 20px;
  display: flex; flex-direction: column; gap: 12px;
  border: 1px solid; transition: transform 0.15s, filter 0.15s;
}
.otile:hover { transform: translateY(-2px); filter: brightness(1.1); }
.otile.yes { background: var(--green-dim); border-color: var(--green-border); }
.otile.no  { background: var(--red-dim);   border-color: var(--red-border); }

.otile-top { display: flex; align-items: center; justify-content: space-between; }
.otile-dir { font-size: 12px; font-weight: 800; display: flex; align-items: center; gap: 5px; letter-spacing: -0.2px; }
.otile.yes .otile-dir { color: var(--green); }
.otile.no  .otile-dir { color: var(--red); }
.otile-pct { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--sub); }

.otile-price-row { display: flex; align-items: baseline; gap: 5px; }
.oprice {
  font-family: 'Space Mono', monospace; font-size: 40px; font-weight: 700;
  letter-spacing: -2px; line-height: 1; transition: all 0.2s;
}
.otile.yes .oprice { color: var(--green); }
.otile.no  .oprice { color: var(--red); }
.ounit { font-size: 11px; color: var(--sub); font-family: 'Space Mono', monospace; }

.opayout { font-size: 10px; color: var(--sub); display: flex; align-items: center; gap: 3px; }
.otile.yes .opayout strong { color: var(--green); font-weight: 700; }
.otile.no  .opayout strong { color: var(--red);   font-weight: 700; }

@keyframes flash-g { 0%{background:rgba(0,230,118,0.2)} 100%{background:var(--green-dim)} }
@keyframes flash-r { 0%{background:rgba(255,23,68,0.2)}  100%{background:var(--red-dim)} }
.otile.yes.flash { animation: flash-g 0.35s ease-out; }
.otile.no.flash  { animation: flash-r 0.35s ease-out; }

/* LOADING */
.loading { display: flex; flex-direction: column; align-items: center; padding: 80px 20px; gap: 14px; color: var(--muted); font-size: 13px; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 500px) {
  .odds-row { grid-template-columns: 1fr; }
  .ptb-row { grid-template-columns: 1fr; }
  .ptb-sep { display: none; }
  .oprice { font-size: 32px; }
}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="btc-icon">₿</div>BTC 5M Live</div>
  <div class="header-right">
    <div class="ws-pill connecting" id="ws-pill"><div class="ws-dot"></div><span id="ws-label">CONNECTING</span></div>
    <div class="clock" id="clock">--:--:-- UTC</div>
  </div>
</header>

<div class="btc-strip">
  <div>
    <div class="btc-strip-label">Bitcoin / USD</div>
    <div class="btc-big" id="btc-val">—</div>
    <div class="source-tag"><div class="cl-badge">CHAINLINK</div> same feed as Polymarket</div>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div><div>Connecting to live feed...</div></div>
</div>

<script>
const RAILWAY_WS = 'wss://v3-production-1fb6.up.railway.app';

let ws = null, currentMarket = null, latestOdds = {yes:0.5,no:0.5};
let btcPrice = null, prevBTC = null, cdTimer = null, reconnDelay = 1000;

setInterval(() => {
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getUTCHours(),n.getUTCMinutes(),n.getUTCSeconds()].map(v=>String(v).padStart(2,'0')).join(':')+' UTC';
}, 1000);

function fmt(n,d=2){ return n==null||isNaN(n)?'—':parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtT(s){ return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

function setBTC(p) {
  const el = document.getElementById('btc-val');
  el.textContent = '$'+fmt(p,2);
  if (prevBTC!=null) {
    el.className = 'btc-big '+(p>prevBTC?'up':p<prevBTC?'down':'');
    setTimeout(()=>el.className='btc-big',600);
  }
  prevBTC = p;
}

function updateOdds(yes,no) {
  const yEl=document.getElementById('yes-p'), nEl=document.getElementById('no-p');
  const yPct=document.getElementById('yes-pct'), nPct=document.getElementById('no-pct');
  const yPay=document.getElementById('yes-pay'), nPay=document.getElementById('no-pay');
  const yT=document.getElementById('yes-tile'), nT=document.getElementById('no-tile');
  if(!yEl) return;
  yEl.textContent='¢'+Math.round(yes*100);
  nEl.textContent='¢'+Math.round(no*100);
  yPct.textContent=Math.round(yes*100)+'% implied';
  nPct.textContent=Math.round(no*100)+'% implied';
  yPay.innerHTML=`Pays <strong>${yes>0?(1/yes).toFixed(2):'—'}x</strong> if BTC finishes higher`;
  nPay.innerHTML=`Pays <strong>${no>0?(1/no).toFixed(2):'—'}x</strong> if BTC finishes lower`;
  [yT,nT].forEach(t=>{ t?.classList.remove('flash'); void t?.offsetWidth; t?.classList.add('flash'); });
}

function updateDir() {
  const dEl=document.getElementById('dtag'), cEl=document.getElementById('cur-val');
  if(!dEl||!currentMarket||!btcPrice) return;
  cEl.textContent='$'+fmt(btcPrice,2);
  const sp=currentMarket.startPrice;
  if(!sp) return;
  const diff=btcPrice-sp, pct=((diff/sp)*100).toFixed(3);
  if(diff>0)      { dEl.className='dtag up';   dEl.textContent=`▲ UP +${pct}%`; }
  else if(diff<0) { dEl.className='dtag down'; dEl.textContent=`▼ DOWN ${pct}%`; }
  else            { dEl.className='dtag flat'; dEl.textContent='→ FLAT'; }
}

function render(market, odds) {
  const step=5*60, now=Math.floor(Date.now()/1000);
  const secsLeft=Math.max(0,market.endSec-now);
  const isLive=secsLeft>0;
  const pct=Math.max(0,Math.min(100,(secsLeft/step)*100));
  const bc=pct<20?'var(--red)':pct<40?'var(--amber)':'var(--green)';
  const yp=odds.yes, np=odds.no;
  const sp=market.startPrice;
  const startDt=new Date(market.wts*1000), endDt=new Date(market.endSec*1000);
  const fh=d=>d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'America/New_York'});

  let dirHtml='<div class="dtag flat" id="dtag">— loading</div>';
  if(btcPrice&&sp) {
    const diff=btcPrice-sp, pct=((diff/sp)*100).toFixed(3);
    if(diff>0)      dirHtml=`<div class="dtag up"   id="dtag">▲ UP +${pct}%</div>`;
    else if(diff<0) dirHtml=`<div class="dtag down" id="dtag">▼ DOWN ${pct}%</div>`;
    else            dirHtml=`<div class="dtag flat" id="dtag">→ FLAT</div>`;
  }

  document.getElementById('main').innerHTML = `
  <div class="mcard ${isLive?'live':'settled'}">
    <div class="mcard-top">
      <div>
        <div class="mcard-title">Bitcoin Up or Down — 5 Minutes</div>
        <div class="mcard-sub">${fh(startDt)} – ${fh(endDt)} ET</div>
      </div>
      <div class="spill ${isLive?'live':'settled'}"><div class="spill-dot"></div>${isLive?'LIVE':'SETTLED'}</div>
    </div>

    <div class="ptb-row">
      <div class="ptb-col">
        <div class="ptb-label">Price to beat</div>
        <div class="ptb-val">${sp?'$'+fmt(sp,2):'—'}</div>
        <div class="ptb-hint">Chainlink BTC/USD at window open</div>
      </div>
      <div class="ptb-sep"></div>
      <div class="ptb-col">
        <div class="ptb-label">Current price</div>
        <div class="ptb-val" id="cur-val">${btcPrice?'$'+fmt(btcPrice,2):'—'}</div>
        ${dirHtml}
      </div>
    </div>

    ${isLive?`
    <div class="timer-row">
      <div class="timer-lbl">Closes in</div>
      <div class="timer-val" id="tv">${fmtT(secsLeft)}</div>
      <div class="timer-track"><div class="timer-fill" id="tf" style="width:${pct}%;background:${bc}"></div></div>
    </div>`:''}

    <div class="odds-row">
      <div class="otile yes" id="yes-tile">
        <div class="otile-top">
          <div class="otile-dir">↑ YES · Up</div>
          <div class="otile-pct" id="yes-pct">${Math.round(yp*100)}% implied</div>
        </div>
        <div class="otile-price-row">
          <div class="oprice" id="yes-p">¢${Math.round(yp*100)}</div>
          <div class="ounit">per share</div>
        </div>
        <div class="opayout" id="yes-pay">Pays <strong>${yp>0?(1/yp).toFixed(2):'—'}x</strong> if BTC finishes higher</div>
      </div>
      <div class="otile no" id="no-tile">
        <div class="otile-top">
          <div class="otile-dir">↓ NO · Down</div>
          <div class="otile-pct" id="no-pct">${Math.round(np*100)}% implied</div>
        </div>
        <div class="otile-price-row">
          <div class="oprice" id="no-p">¢${Math.round(np*100)}</div>
          <div class="ounit">per share</div>
        </div>
        <div class="opayout" id="no-pay">Pays <strong>${np>0?(1/np).toFixed(2):'—'}x</strong> if BTC finishes lower</div>
      </div>
    </div>
  </div>`;

  startCd();
}

function startCd() {
  if(cdTimer) clearInterval(cdTimer);
  cdTimer=setInterval(()=>{
    if(!currentMarket) return;
    const s=Math.max(0,currentMarket.endSec-Math.floor(Date.now()/1000));
    const p=Math.max(0,Math.min(100,(s/(5*60))*100));
    const tv=document.getElementById('tv'), tf=document.getElementById('tf');
    if(tv) tv.textContent=fmtT(s);
    if(tf){ tf.style.width=p+'%'; tf.style.background=p<20?'var(--red)':p<40?'var(--amber)':'var(--green)'; }
  },1000);
}

function setWS(state) {
  document.getElementById('ws-pill').className='ws-pill '+state;
  document.getElementById('ws-label').textContent=state.toUpperCase();
}

function connect() {
  setWS('connecting');
  ws=new WebSocket(RAILWAY_WS);
  ws.onopen=()=>{ setWS('connected'); reconnDelay=1000; };
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='market'){ currentMarket=msg.market; latestOdds=msg.odds; render(currentMarket,latestOdds); }
    if(msg.type==='btc_price'){ btcPrice=msg.price; setBTC(btcPrice); updateDir(); }
    if(msg.type==='odds'){ latestOdds={yes:msg.yes,no:msg.no}; updateOdds(msg.yes,msg.no); }
  };
  ws.onclose=()=>{ setWS('disconnected'); setTimeout(connect, reconnDelay=(Math.min(reconnDelay*1.5,15000))); };
  ws.onerror=()=>setWS('disconnected');
}

connect();
</script>
</body>
</html>
